<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotating Gradient Loader - EaseMotion CSS</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Link component styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="showcase-container">
      <header class="header">
        <h1>Rotating Gradient Loader</h1>
        <p>
          Premium, high-performance circular loaders driven by pure CSS
          gradient-rotation effects.
        </p>
      </header>

      <div class="loaders-grid">
        <!-- Variant 1: Aurora Glow -->
        <div class="loader-card" id="loader-aurora-card">
          <div class="loader-wrapper">
            <div class="ease-loader-aurora" id="loader-aurora"></div>
          </div>
          <h3>Aurora Glow</h3>
          <p>Smooth, glowing conic-gradient transition.</p>
        </div>

        <!-- Variant 2: Cosmic Dual Orbit -->
        <div class="loader-card" id="loader-dual-orbit-card">
          <div class="loader-wrapper">
            <div class="ease-loader-dual-orbit" id="loader-dual-orbit">
              <div class="outer-orbit"></div>
              <div class="inner-orbit"></div>
            </div>
          </div>
          <h3>Cosmic Dual Orbit</h3>
          <p>Concentric counter-rotating orbits.</p>
        </div>

        <!-- Variant 3: Cyberpunk Neon -->
        <div class="loader-card" id="loader-cyberpunk-card">
          <div class="loader-wrapper">
            <div class="ease-loader-cyberpunk" id="loader-cyberpunk"></div>
          </div>
          <h3>Cyberpunk Neon</h3>
          <p>Dashed segmented gradient ring layout.</p>
        </div>
      </div>
    </div>
  </body>
</html>
